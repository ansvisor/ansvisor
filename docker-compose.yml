services:
  web:
    image: ghcr.io/optumus/optumus-analytics/web:0.1.4
    build: ./web
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env
    depends_on:
      - server
    restart: unless-stopped

  server:
    image: ghcr.io/optumus/optumus-analytics/server:0.1.4
    build: ./server
    ports:
      - "80:80"
    env_file:
      - ./server/.env
    restart: unless-stopped
